<!DOCTYPE html>
<html>
<head>
    <title>Real-Time Sync Test</title>
    <style>
        body { font-family: monospace; background: #000; color: #fff; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .editors { display: flex; gap: 20px; margin: 20px 0; }
        .editor { flex: 1; }
        textarea { 
            width: 100%; height: 200px; background: #111; color: #fff; 
            border: 1px solid #333; padding: 10px; font-family: monospace;
        }
        .status { padding: 10px; background: #222; margin: 10px 0; border-radius: 4px; }
        .connected { color: #0f0; }
        .disconnected { color: #f00; }
        button { 
            background: #333; color: #fff; border: none; padding: 8px 16px; 
            margin: 5px; cursor: pointer; border-radius: 4px;
        }
        button:hover { background: #555; }
        .log { 
            background: #111; padding: 10px; height: 150px; overflow-y: auto; 
            font-size: 12px; border: 1px solid #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Real-Time Character Sync Test</h1>
        
        <div class="status">
            Status: <span id="status" class="disconnected">Disconnected</span>
            | Users: <span id="userCount">0</span>
        </div>
        
        <button onclick="connect()">Connect</button>
        <button onclick="disconnect()">Disconnect</button>
        <button onclick="clearLog()">Clear Log</button>
        
        <div class="editors">
            <div class="editor">
                <h3>Editor 1 (You)</h3>
                <textarea id="editor1" placeholder="Type here...">Hello World!</textarea>
            </div>
            <div class="editor">
                <h3>Editor 2 (Remote)</h3>
                <textarea id="editor2" readonly placeholder="Remote changes appear here...">Hello World!</textarea>
            </div>
        </div>
        
        <div class="log" id="log"></div>
    </div>

    <script>
        let isConnected = false;
        let isApplyingRemote = false;
        let lastContent = '';
        let users = new Set();
        
        const editor1 = document.getElementById('editor1');
        const editor2 = document.getElementById('editor2');
        const status = document.getElementById('status');
        const userCount = document.getElementById('userCount');
        const log = document.getElementById('log');
        
        // Simulate real-time sync without WebSocket
        function simulateRealTimeSync() {
            if (!isConnected) return;
            
            const currentContent = editor1.value;
            if (currentContent !== lastContent && !isApplyingRemote) {\n                // Find the difference\n                const diff = findDifference(lastContent, currentContent);\n                if (diff) {\n                    logMessage(`Sync: ${diff.type} \"${diff.text}\" at position ${diff.position}`);\n                    \n                    // Apply to remote editor immediately\n                    setTimeout(() => {\n                        isApplyingRemote = true;\n                        editor2.value = currentContent;\n                        isApplyingRemote = false;\n                        logMessage('✅ Applied to remote editor');\n                    }, 10); // Minimal delay to simulate network\n                }\n                lastContent = currentContent;\n            }\n        }\n        \n        function findDifference(oldText, newText) {\n            if (oldText === newText) return null;\n            \n            // Find insertion point\n            let i = 0;\n            while (i < oldText.length && i < newText.length && oldText[i] === newText[i]) {\n                i++;\n            }\n            \n            if (newText.length > oldText.length) {\n                // Insertion\n                return {\n                    type: 'insert',\n                    position: i,\n                    text: newText.slice(i, i + (newText.length - oldText.length))\n                };\n            } else if (newText.length < oldText.length) {\n                // Deletion\n                return {\n                    type: 'delete',\n                    position: i,\n                    text: oldText.slice(i, i + (oldText.length - newText.length))\n                };\n            } else {\n                // Replacement\n                let j = oldText.length - 1;\n                let k = newText.length - 1;\n                while (j >= i && k >= i && oldText[j] === newText[k]) {\n                    j--;\n                    k--;\n                }\n                return {\n                    type: 'replace',\n                    position: i,\n                    text: newText.slice(i, k + 1)\n                };\n            }\n        }\n        \n        function connect() {\n            isConnected = true;\n            status.textContent = 'Connected';\n            status.className = 'connected';\n            users.add('user1');\n            users.add('user2');\n            userCount.textContent = users.size;\n            lastContent = editor1.value;\n            logMessage('🟢 Connected to real-time sync');\n        }\n        \n        function disconnect() {\n            isConnected = false;\n            status.textContent = 'Disconnected';\n            status.className = 'disconnected';\n            users.clear();\n            userCount.textContent = '0';\n            logMessage('🔴 Disconnected from sync');\n        }\n        \n        function logMessage(msg) {\n            const time = new Date().toLocaleTimeString();\n            log.innerHTML += `<div>[${time}] ${msg}</div>`;\n            log.scrollTop = log.scrollHeight;\n        }\n        \n        function clearLog() {\n            log.innerHTML = '';\n        }\n        \n        // Real-time input monitoring\n        editor1.addEventListener('input', () => {\n            if (isConnected) {\n                simulateRealTimeSync();\n            }\n        });\n        \n        // Auto-connect for demo\n        setTimeout(connect, 1000);\n        \n        logMessage('Real-time sync test initialized');\n    </script>
</body>
</html>
